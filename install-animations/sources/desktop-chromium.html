<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden;
        background: #0e0c09; font-family: "Inter", sans-serif; -webkit-font-smoothing: antialiased; }

      [data-composition-id="main"] {
        --atmosphere:#0e0c09; --surface:#2c2c26; --text:#d7d6cb; --text-dim:#8d8b7e;
        --teal:#77c5c5; --teal-fill:#509595;
        --c-tab:#2b2b2e; --c-bar:#35363a; --c-omni:#202124; --c-dialog:#292a2d;
        --c-blue:#8ab4f8; --c-ico:#9aa0a6;
        position: relative; width: 1920px; height: 1080px;
        background: radial-gradient(120% 100% at 50% 0%, #17140f 0%, #0e0c09 65%); }

      .scene { position: absolute; inset: 0; width: 1920px; height: 1080px;
        background: radial-gradient(120% 100% at 50% 0%, #17140f 0%, #0e0c09 65%); }
      #s1 { z-index: 10; } #s2 { z-index: 20; } #s3 { z-index: 30; } #s4 { z-index: 40; }

      /* caption band */
      .top-band { position: absolute; top: 0; left: 0; right: 0; height: 150px;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; }
      .caption { background: var(--surface); color: var(--text); font-size: 40px; font-weight: 600;
        letter-spacing: -0.5px; padding: 18px 40px; border-radius: 999px;
        border: 1px solid rgba(215,214,203,0.12); box-shadow: 0 16px 44px rgba(0,0,0,0.55); white-space: nowrap; }
      .caption b { color: var(--teal); font-weight: 700; }
      .steps { display: flex; gap: 14px; }
      .dot { width: 14px; height: 14px; border-radius: 50%; background: rgba(215,214,203,0.22); }
      .dot.on { background: var(--teal); box-shadow: 0 0 16px rgba(119,197,197,0.6); }

      /* browser window */
      .win { position: absolute; left: 200px; top: 196px; width: 1520px; height: 760px;
        border-radius: 16px; background: var(--c-bar); overflow: hidden;
        box-shadow: 0 50px 130px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,255,255,0.05); }
      .tabstrip { height: 52px; background: var(--c-tab); display: flex; align-items: center; padding: 0 22px; gap: 18px; }
      .lights { display: flex; gap: 12px; }
      .lights i { width: 18px; height: 18px; border-radius: 50%; display: block; }
      .lights i:nth-child(1){background:#ff5f57} .lights i:nth-child(2){background:#febc2e} .lights i:nth-child(3){background:#28c840}
      .tab { margin-left: 14px; height: 38px; background: var(--c-bar); border-radius: 10px 10px 0 0;
        display: flex; align-items: center; gap: 12px; padding: 0 22px; color: #e8eaed; font-size: 24px; }
      .tab img { width: 26px; height: 26px; border-radius: 6px; }
      .toolbar { height: 68px; background: var(--c-bar); display: flex; align-items: center; padding: 0 22px; gap: 18px;
        border-bottom: 1px solid rgba(0,0,0,0.4); }
      .navi { width: 40px; height: 40px; position: relative; flex: 0 0 40px; }
      .navi.back::before,.navi.fwd::before{content:"";position:absolute;top:11px;left:11px;width:16px;height:16px;
        border-left:4px solid var(--c-ico);border-bottom:4px solid var(--c-ico);}
      .navi.back::before{transform:rotate(45deg)} .navi.fwd::before{left:9px;transform:rotate(-135deg);opacity:.5}
      .navi.rel::before{content:"";position:absolute;top:9px;left:9px;width:20px;height:20px;border:4px solid var(--c-ico);
        border-radius:50%;border-top-color:transparent;}
      .omni { flex: 1; height: 46px; background: var(--c-omni); border-radius: 23px; display: flex; align-items: center;
        padding: 0 18px; gap: 14px; color: #bdc1c6; font-size: 26px; position: relative; }
      .omni .lock { font-size: 22px; opacity: 0.8; }
      .omni .url { flex: 1; }
      /* install icon: monitor + down arrow */
      .install-ico { width: 44px; height: 44px; border-radius: 50%; position: relative; flex: 0 0 44px; }
      .install-ico .mon { position: absolute; left: 9px; top: 13px; width: 26px; height: 19px;
        border: 3px solid var(--c-ico); border-radius: 4px; }
      .install-ico .mon::after { content:""; position:absolute; left:6px; bottom:-8px; width:11px; height:4px; background:var(--c-ico); border-radius:2px; }
      .install-ico .dn { position: absolute; left: 20px; top: 16px; width: 4px; height: 13px; background: var(--c-ico); border-radius:2px; }
      .install-ico .dn::after { content:""; position:absolute; bottom:-1px; left:-5px; width:14px; height:14px;
        border-bottom:3px solid var(--c-ico); border-right:3px solid var(--c-ico); transform:rotate(45deg); }
      .profile { width: 44px; height: 44px; border-radius: 50%; background: var(--teal-fill); flex: 0 0 44px;
        display:flex; align-items:center; justify-content:center; color:#0e0c09; font-weight:700; font-size:24px; }
      .menu { width: 30px; flex: 0 0 30px; display:flex; flex-direction:column; gap:5px; align-items:center; }
      .menu i { width: 6px; height: 6px; border-radius: 50%; background: var(--c-ico); }

      /* app content */
      .content { position: absolute; left: 0; right: 0; top: 120px; bottom: 0;
        background: radial-gradient(120% 90% at 50% 0%, #1b1813 0%, #0e0c09 75%); padding: 50px 60px; }
      .gallery { display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px; }
      .pcard { aspect-ratio: 3/4; border-radius: 20px; background: #2c2c26; padding: 26px;
        display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(3,1fr); gap: 16px;
        box-shadow: 0 24px 56px rgba(0,0,0,0.45); }
      .pcard i { border-radius: 12px; display:block; }
      .pcard i:nth-child(odd){background:#509595} .pcard i:nth-child(even){background:#955050}
      .pcard.b i:nth-child(1){background:#5a5a52} .pcard.b i:nth-child(6){background:#5a5a52}
      .pcard.c i:nth-child(3){background:#5a5a52} .pcard.c i:nth-child(4){background:#bc7b4e}

      /* install dialog */
      .dialog { position: absolute; width: 470px; background: var(--c-dialog); border-radius: 16px;
        box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06); padding: 34px 36px; }
      .dialog .dhead { display:flex; align-items:center; gap: 22px; margin-bottom: 14px; }
      .dialog .dhead img { width: 64px; height:64px; border-radius: 14px; }
      .dialog .dhead .dt { color:#e8eaed; font-size: 32px; font-weight:600; }
      .dialog .dsub { color:#9aa0a6; font-size: 26px; margin: 6px 0 30px 86px; }
      .dialog .dbtns { display:flex; justify-content:flex-end; gap: 26px; align-items:center; }
      .dialog .cancel { color:#8ab4f8; font-size: 28px; font-weight:600; }
      .dialog .install { background:#8ab4f8; color:#202124; font-size: 28px; font-weight:700;
        padding: 14px 34px; border-radius: 999px; }

      /* installed standalone window (scene 4) */
      .appwin { position: absolute; left: 360px; top: 210px; width: 1200px; height: 650px; border-radius: 16px;
        background: var(--c-bar); overflow: hidden; box-shadow: 0 50px 130px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,255,255,0.05); }
      .appbar { height: 56px; background: #1d1c1a; display:flex; align-items:center; padding: 0 22px; gap: 18px; }
      .appbar .title { color:#d7d6cb; font-size: 24px; font-weight:600; margin-left: 8px; }
      .appbar img { width: 30px; height: 30px; border-radius: 7px; }
      .dock { position: absolute; left: 50%; bottom: 40px; transform: translateX(-50%);
        display:flex; gap: 26px; padding: 16px 26px; border-radius: 28px; background: rgba(40,38,32,0.55);
        border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(8px); }
      .dock .di { width: 86px; height: 86px; border-radius: 20px; background: rgba(215,214,203,0.12); }
      .dock img { width: 86px; height: 86px; border-radius: 20px; box-shadow: 0 12px 30px rgba(0,0,0,0.5); }

      /* cursor + ring + ripple */
      .cursor { position: absolute; width: 40px; height: 40px; z-index: 90; pointer-events:none;
        filter: drop-shadow(0 3px 4px rgba(0,0,0,0.5)); }
      .ring { position:absolute; top:50%; left:50%; width: 110px; height:110px; margin:-55px 0 0 -55px;
        border: 6px solid var(--teal); border-radius: 50%; z-index: 80;
        box-shadow: 0 0 28px rgba(119,197,197,0.55); pointer-events:none; opacity:0; }
      .ripple { position:absolute; top:50%; left:50%; width: 110px; height:110px; margin:-55px 0 0 -55px;
        border: 5px solid var(--teal); border-radius:50%; z-index: 79; pointer-events:none; opacity:0; }

      /* title card */
      .title-wrap { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center;
        justify-content:center; gap: 38px; }
      .title-wrap img { width: 230px; height:230px; border-radius: 52px; box-shadow: 0 40px 100px rgba(0,0,0,0.6); }
      .t-h { color: var(--text); font-size: 92px; font-weight: 700; letter-spacing:-2px; text-align:center; }
      .t-h b { color: var(--teal); }
      .t-tag { display:flex; align-items:center; gap: 18px; color: var(--text); font-size: 38px;
        background: var(--surface); padding: 16px 36px; border-radius: 999px; border:1px solid rgba(215,214,203,0.12); }
      .t-tag .d { width:14px; height:14px; border-radius:50%; background: var(--teal); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="12.0" data-width="1920" data-height="1080">

      <!-- SCENE 1 — title -->
      <div id="s1" class="clip scene" data-start="0" data-duration="2.8" data-track-index="1" data-layout-allow-overlap>
        <div class="title-wrap">
          <img id="s1-icon" src="assets/realness-icon.png" alt="Realness" />
          <div id="s1-h" class="t-h">Install Realness on <b>your desktop</b></div>
          <div id="s1-tag" class="t-tag"><span class="d"></span>Chrome · Edge · Brave</div>
        </div>
      </div>

      <!-- SCENE 2 — click install icon -->
      <div id="s2" class="clip scene" data-start="2.6" data-duration="3.6" data-track-index="2" data-layout-allow-overlap>
        <div class="top-band">
          <div id="s2-cap" class="caption">Click the <b>install icon</b> in the address bar</div>
          <div class="steps"><span class="dot on"></span><span class="dot"></span><span class="dot"></span></div>
        </div>
        <div class="win">
          <div class="tabstrip"><div class="lights"><i></i><i></i><i></i></div>
            <div class="tab"><img src="assets/realness-icon.png" alt="" />Realness</div></div>
          <div class="toolbar">
            <div class="navi back"></div><div class="navi fwd"></div><div class="navi rel"></div>
            <div class="omni"><span class="lock">🔒</span><span class="url">realness.online</span>
              <div id="s2-install" class="install-ico"><span class="mon"></span><span class="dn"></span></div>
            </div>
            <div class="profile">R</div>
            <div class="menu"><i></i><i></i><i></i></div>
          </div>
          <div class="content">
            <div class="gallery">
              <div class="pcard b"><i></i><i></i><i></i><i></i><i></i><i></i></div>
              <div class="pcard"><i></i><i></i><i></i><i></i><i></i><i></i></div>
              <div class="pcard c"><i></i><i></i><i></i><i></i><i></i><i></i></div>
              <div class="pcard b"><i></i><i></i><i></i><i></i><i></i><i></i></div>
            </div>
          </div>
        </div>
        <div id="s2-ripple" class="ripple" style="left:1545px; top:284px;"></div>
        <div id="s2-ring" class="ring" style="left:1545px; top:284px;"></div>
        <svg id="s2-cursor" class="cursor" style="left:1505px; top:300px;" viewBox="0 0 24 24" fill="#fff" stroke="#000" stroke-width="1.2"><path d="M4 2 L4 20 L9 15 L12.5 22 L15 21 L11.5 14 L18 14 Z"/></svg>
      </div>

      <!-- SCENE 3 — click Install -->
      <div id="s3" class="clip scene" data-start="6.0" data-duration="3.4" data-track-index="1" data-layout-allow-overlap>
        <div class="top-band">
          <div id="s3-cap" class="caption">Click <b>Install</b></div>
          <div class="steps"><span class="dot on"></span><span class="dot on"></span><span class="dot"></span></div>
        </div>
        <div class="win">
          <div class="tabstrip"><div class="lights"><i></i><i></i><i></i></div>
            <div class="tab"><img src="assets/realness-icon.png" alt="" />Realness</div></div>
          <div class="toolbar">
            <div class="navi back"></div><div class="navi fwd"></div><div class="navi rel"></div>
            <div class="omni"><span class="lock">🔒</span><span class="url">realness.online</span>
              <div class="install-ico"><span class="mon"></span><span class="dn"></span></div>
            </div>
            <div class="profile">R</div>
            <div class="menu"><i></i><i></i><i></i></div>
          </div>
          <div class="content"><div class="gallery">
            <div class="pcard b"><i></i><i></i><i></i><i></i><i></i><i></i></div>
            <div class="pcard"><i></i><i></i><i></i><i></i><i></i><i></i></div>
            <div class="pcard c"><i></i><i></i><i></i><i></i><i></i><i></i></div>
            <div class="pcard b"><i></i><i></i><i></i><i></i><i></i><i></i></div>
          </div></div>
        </div>
        <div id="s3-dialog" class="dialog" style="left:1252px; top:340px;">
          <div class="dhead"><img src="assets/realness-icon.png" alt="" /><span class="dt">Install app?</span></div>
          <div class="dsub">Realness &nbsp;·&nbsp; realness.online</div>
          <div class="dbtns"><span class="cancel">Cancel</span><span id="s3-installbtn" class="install">Install</span></div>
        </div>
        <div id="s3-ripple" class="ripple" style="left:1592px; top:566px;"></div>
        <div id="s3-ring" class="ring" style="left:1592px; top:566px;"></div>
        <svg id="s3-cursor" class="cursor" style="left:1572px; top:582px;" viewBox="0 0 24 24" fill="#fff" stroke="#000" stroke-width="1.2"><path d="M4 2 L4 20 L9 15 L12.5 22 L15 21 L11.5 14 L18 14 Z"/></svg>
      </div>

      <!-- SCENE 4 — installed, own window -->
      <div id="s4" class="clip scene" data-start="9.2" data-duration="2.8" data-track-index="2" data-layout-allow-overlap>
        <div class="top-band">
          <div id="s4-cap" class="caption">Realness opens in <b>its own window</b></div>
          <div class="steps"><span class="dot on"></span><span class="dot on"></span><span class="dot on"></span></div>
        </div>
        <div id="s4-win" class="appwin">
          <div class="appbar"><div class="lights"><i></i><i></i><i></i></div>
            <img src="assets/realness-icon.png" alt="" /><span class="title">Realness</span></div>
          <div class="content" style="top:56px; padding:44px 54px;"><div class="gallery">
            <div class="pcard"><i></i><i></i><i></i><i></i><i></i><i></i></div>
            <div class="pcard c"><i></i><i></i><i></i><i></i><i></i><i></i></div>
            <div class="pcard b"><i></i><i></i><i></i><i></i><i></i><i></i></div>
            <div class="pcard"><i></i><i></i><i></i><i></i><i></i><i></i></div>
          </div></div>
        </div>
        <div class="dock">
          <div class="di"></div><div class="di"></div>
          <img id="s4-dockicon" src="assets/realness-icon.png" alt="Realness" />
          <div class="di"></div><div class="di"></div>
        </div>
      </div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      function clickAt(cursor, ring, ripple, t, fromX, fromY, toX, toY) {
        tl.set(cursor, { x: 0, y: 0 }, 0);
        tl.fromTo(cursor, { x: fromX, y: fromY }, { x: toX, y: toY, duration: 0.7, ease: "power2.inOut" }, t);
        tl.fromTo(ring, { opacity: 0, scale: 1.7 }, { opacity: 1, scale: 1, duration: 0.4, ease: "power2.out" }, t + 0.55);
        tl.to(ring, { scale: 1.12, duration: 0.25, ease: "sine.inOut", repeat: 1, yoyo: true }, t + 0.95);
        tl.to(ring, { scale: 0.82, duration: 0.12, ease: "power2.in", overwrite: "auto" }, t + 1.45);
        tl.to(ring, { scale: 1.0, duration: 0.18, ease: "power2.out" }, t + 1.57);
        tl.fromTo(ripple, { opacity: 0.7, scale: 0.6 }, { opacity: 0, scale: 2.1, duration: 0.55, ease: "power2.out", immediateRender: false }, t + 1.45);
      }

      /* Scene 1 */
      tl.from("#s1-icon", { opacity: 0, scale: 0.6, duration: 0.7, ease: "back.out(1.4)" }, 0.15);
      tl.from("#s1-h",    { opacity: 0, y: 46, duration: 0.6, ease: "power3.out" }, 0.4);
      tl.from("#s1-tag",  { opacity: 0, scale: 0.9, duration: 0.5, ease: "back.out(1.6)" }, 0.66);

      /* Scene 2 — move cursor to install icon, click */
      tl.from("#s2", { opacity: 0, duration: 0.4, ease: "power1.out" }, 2.6);
      tl.from("#s2 .win", { y: 40, opacity: 0, duration: 0.6, ease: "power3.out" }, 2.7);
      tl.from("#s2-cap",  { y: -28, opacity: 0, duration: 0.5, ease: "power2.out" }, 2.8);
      clickAt("#s2-cursor", "#s2-ring", "#s2-ripple", 3.3, -40, 60, 0, 0);

      /* Scene 3 — dialog appears, click Install */
      tl.from("#s3", { opacity: 0, duration: 0.4, ease: "power1.out" }, 6.0);
      tl.from("#s3-cap", { y: -28, opacity: 0, duration: 0.5, ease: "power2.out" }, 6.1);
      tl.from("#s3-dialog", { y: -24, opacity: 0, scale: 0.94, duration: 0.5, ease: "back.out(1.3)", transformOrigin: "80% 0%" }, 6.2);
      clickAt("#s3-cursor", "#s3-ring", "#s3-ripple", 6.7, -20, -120, 0, 0);

      /* Scene 4 — installed window + dock */
      tl.from("#s4", { opacity: 0, duration: 0.4, ease: "power1.out" }, 9.2);
      tl.from("#s4-cap", { y: -28, opacity: 0, duration: 0.5, ease: "power2.out" }, 9.3);
      tl.from("#s4-win", { scale: 0.9, opacity: 0, duration: 0.6, ease: "back.out(1.2)", transformOrigin: "50% 60%" }, 9.4);
      tl.from(".dock", { y: 60, opacity: 0, duration: 0.5, ease: "power2.out" }, 9.7);
      tl.from("#s4-dockicon", { y: 40, scale: 0.4, opacity: 0, duration: 0.7, ease: "back.out(2)" }, 10.0);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
